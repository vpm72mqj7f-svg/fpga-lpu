# FPGA LPU — Icarus Verilog Simulation (PR Gate)
# Runs all bring-up testbenches on every PR that touches RTL.
# Target: <5 minutes. Bring-up parameters only (production would take hours).

name: Icarus RTL Simulation

on:
  pull_request:
    paths:
      - 'rtl/**'
      - 'scripts/simulation/gen_*.py'
  push:
    branches: [master]
    paths:
      - 'rtl/**'

jobs:
  sim:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Icarus Verilog
        run: sudo apt-get update -qq && sudo apt-get install -y -qq iverilog

      - name: Run Unit Testbenches
        working-directory: rtl/sim
        run: |
          make tb_fp4_mac          || exit 1
          make tb_fp4_gemm_engine  || exit 1
          make tb_fp4_systolic_2d  || exit 1
          make tb_rms_norm         || exit 1
          make tb_silu_q12_lut     || exit 1

      - name: Run Module Testbenches
        working-directory: rtl/sim
        run: |
          make tb_mla_qkv          || exit 1
          make tb_router_topk      || exit 1
          make tb_expert_ffn_engine_fp4_down || exit 1

      - name: Run Integration Testbenches
        working-directory: rtl/sim
        run: |
          make tb_layer_compute_engine  || exit 1
          make tb_full_transformer_layer || exit 1
          make tb_chip_12layer          || exit 1

      - name: Summary
        run: echo "All Icarus simulations passed."
